services:
  agensense:
    environment:
      AGENSENSE_DEMO_PROVIDER_PROFILE_ID: "omlx-local"
      AGENSENSE_DEFAULT_PROVIDER_ID: "omlx-local"
      AGENSENSE_DEFAULT_PROVIDER_NAME: "oMLX Local Voice Stack"
      AGENSENSE_DEFAULT_PROVIDER_BASE_URL: "${OMLX_BASE_URL:-http://host.docker.internal:8000/v1}"
      AGENSENSE_DEFAULT_PROVIDER_API_KEY: "${OMLX_API_KEY:-}"
      AGENSENSE_DEFAULT_ASR_MODEL: "${AGENSENSE_DEFAULT_ASR_MODEL:-nemotron-3.5-asr-streaming-0.6b-8bit}"
      AGENSENSE_DEFAULT_LLM_MODEL: "${AGENSENSE_DEFAULT_LLM_MODEL:-gemma-4-E4B-it-MLX-4bit}"
      AGENSENSE_DEFAULT_MULTIMODAL_MODEL: "${AGENSENSE_DEFAULT_MULTIMODAL_MODEL:-Qwen3.6-27B-MLX-4bit}"
      AGENSENSE_DEFAULT_TTS_MODEL: "${AGENSENSE_DEFAULT_TTS_MODEL:-Qwen3-TTS-12Hz-0.6B-Base-8bit}"
      AGENSENSE_DEFAULT_VAD_MODEL: "${AGENSENSE_DEFAULT_VAD_MODEL:-silero-vad-v6}"
      AGENSENSE_OPENAI_REASONING_EFFORT: "${AGENSENSE_OPENAI_REASONING_EFFORT:-none}"
      AGENSENSE_OPENAI_TTS_VOICE: "${AGENSENSE_OPENAI_TTS_VOICE:-none}"
      AGENSENSE_OPENAI_TTS_RESPONSE_FORMAT: "${AGENSENSE_OPENAI_TTS_RESPONSE_FORMAT:-pcm}"
      AGENSENSE_OPENAI_TTS_SENTENCE_STREAM: "${AGENSENSE_OPENAI_TTS_SENTENCE_STREAM:-1}"
      AGENSENSE_OPENAI_TTS_SEGMENT_MAX_RUNES: "${AGENSENSE_OPENAI_TTS_SEGMENT_MAX_RUNES:-32}"
      AGENSENSE_OPENAI_TTS_SEGMENT_SILENCE_MS: "${AGENSENSE_OPENAI_TTS_SEGMENT_SILENCE_MS:-80}"
      AGENSENSE_REALTIME_TTS_MAX_RUNES: "${AGENSENSE_REALTIME_TTS_MAX_RUNES:-28}"
      AGENSENSE_REALTIME_TTS_SOFT_MIN_RUNES: "${AGENSENSE_REALTIME_TTS_SOFT_MIN_RUNES:-20}"
