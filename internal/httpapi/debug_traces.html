<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agensense Debug Traces</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111c;
      --panel: #101c2b;
      --panel-2: #152334;
      --border: #22354d;
      --text: #e7eef8;
      --muted: #8ea1ba;
      --accent: #56d6c2;
      --warn: #ffcf70;
      --error: #ff7f8c;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: linear-gradient(180deg, #08111c 0%, #0c1725 100%);
      color: var(--text);
    }
    .shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    .sidebar, .detail {
      padding: 18px;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(9, 16, 26, 0.72);
      backdrop-filter: blur(14px);
      overflow: auto;
    }
    .detail {
      overflow: auto;
    }
    h1, h2, h3, p { margin: 0; }
    .muted { color: var(--muted); }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .toolbar button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .trace-list {
      display: grid;
      gap: 10px;
    }
    .trace-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(18,30,45,.95), rgba(12,22,34,.95));
      cursor: pointer;
    }
    .trace-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(86,214,194,.35);
    }
    .trace-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .trace-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .trace-title strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .trace-kv {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .trace-kv b {
      color: #c8d7ea;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      margin-right: 6px;
      text-transform: uppercase;
    }
    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(21,35,52,.8);
    }
    .pill.running { color: var(--accent); }
    .pill.completed { color: #8ee09d; }
    .pill.error { color: var(--error); }
    .trace-preview {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(16, 28, 43, .9);
      padding: 16px;
    }
    .section h3 {
      margin-bottom: 12px;
      font-size: 15px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .meta-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: rgba(21,35,52,.72);
    }
    .meta-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    pre {
      margin: 0;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7, 13, 20, .9);
      color: #d8e4f5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
    }
    audio {
      width: 100%;
      margin-top: 8px;
    }
    .timeline {
      display: grid;
      gap: 8px;
    }
    .event {
      border-left: 2px solid var(--border);
      padding-left: 12px;
      font-size: 13px;
    }
    .empty {
      display: grid;
      place-items: center;
      min-height: 60vh;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="toolbar">
        <div>
          <h1>Debug Traces</h1>
          <p class="muted">ASR / LLM / TTS / voice turn timeline</p>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
      <div id="traceList" class="trace-list"></div>
    </aside>
    <main class="detail">
      <div id="detail" class="empty">Select a trace to inspect.</div>
    </main>
  </div>
  <script>
    const traceListEl = document.getElementById('traceList');
    const detailEl = document.getElementById('detail');
    const refreshBtn = document.getElementById('refreshBtn');
    let selectedId = null;

    const esc = (value) => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');

    function formatStartedAt(value) {
      if (!value) {
        return '';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      return date.toLocaleString();
    }

    function preview(trace) {
      return trace.llm?.response_text || trace.asr?.text || trace.tts?.text || trace.error || trace.id;
    }

    function traceType(trace) {
      return [trace.kind, trace.source, trace.http_path].filter(Boolean).join(' / ') || 'unknown';
    }

    function renderList(items) {
      if (!items.length) {
        traceListEl.innerHTML = '<div class="trace-card"><div class="trace-preview">No traces yet.</div></div>';
        return;
      }
      traceListEl.innerHTML = items.map((trace) => `
        <article class="trace-card ${trace.id === selectedId ? 'active' : ''}" data-id="${esc(trace.id)}">
          <div class="trace-row">
            <div class="trace-title">
              <strong>${esc(trace.kind || 'unknown')}</strong>
              ${trace.source ? `<span class="pill">${esc(trace.source)}</span>` : ''}
            </div>
            <span class="pill ${esc(trace.status)}">${esc(trace.status)}</span>
          </div>
          <div class="trace-kv">
            <div><b>type</b>${esc(traceType(trace))}</div>
            <div><b>device</b>${esc(trace.device_label || trace.client_id || trace.device_id || 'detached')}</div>
            <div><b>hardware</b>${esc(trace.hardware_sku || '-')}</div>
            <div><b>session</b>${esc(trace.session_id || '-')}</div>
            <div><b>started</b>${esc(formatStartedAt(trace.started_at) || '-')}</div>
          </div>
          <div class="trace-row">
            <span class="muted">${esc(trace.provider_profile_id || '')}</span>
            <span class="pill">${esc(trace.total_duration_ms || 0)} ms</span>
          </div>
          <div class="trace-preview">${esc(preview(trace)).slice(0, 180)}</div>
        </article>
      `).join('');
      traceListEl.querySelectorAll('.trace-card[data-id]').forEach((el) => {
        el.addEventListener('click', () => {
          selectedId = el.dataset.id;
          loadDetail(selectedId);
          renderList(items);
        });
      });
      if (!selectedId && items[0]) {
        selectedId = items[0].id;
        loadDetail(selectedId);
      }
    }

    function renderMeta(trace) {
      const rows = [
        ['kind', trace.kind],
        ['source', trace.source],
        ['status', trace.status],
        ['duration', `${trace.total_duration_ms || 0} ms`],
        ['session', trace.session_id || ''],
        ['device label', trace.device_label || ''],
        ['hardware sku', trace.hardware_sku || ''],
        ['firmware', [trace.firmware_version, trace.firmware_channel].filter(Boolean).join(' / ')],
        ['client', trace.client_id || ''],
        ['device', trace.device_id || ''],
        ['profile', trace.provider_profile_id || ''],
        ['path', trace.http_path || ''],
      ].filter(([, value]) => value);
      return rows.map(([label, value]) => `
        <div class="meta-item">
          <strong>${esc(label)}</strong>
          <span>${esc(value)}</span>
        </div>
      `).join('');
    }

    function renderAudio(label, url, meta) {
      if (!url) {
        return '';
      }
      return `
        <div class="section">
          <h3>${esc(label)}</h3>
          <div class="muted">${esc(meta?.mime || '')} ${meta?.bytes ? `· ${meta.bytes} bytes` : ''} ${meta?.truncated ? '· truncated' : ''}</div>
          <audio controls preload="none" src="${esc(url)}"></audio>
        </div>
      `;
    }

    function renderSegments(trace) {
      const segments = trace.segments || [];
      if (!segments.length) {
        return '';
      }
      return `
        <section class="section">
          <h3>VAD Segments</h3>
          <div class="grid">
            ${segments.map((segment) => `
              <div class="meta-item">
                <strong>${esc(segment.id || 'segment')}</strong>
                <div class="muted">
                  ${esc(segment.start_offset_ms || 0)}-${esc(segment.end_offset_ms || 0)} ms
                  · ${esc(segment.duration_ms || 0)} ms
                  · ${esc(segment.audio_bytes || 0)} bytes
                  · peak ${esc(Number(segment.peak_level || 0).toFixed(3))}
                </div>
                ${segment.text ? `<pre>${esc(segment.text)}</pre>` : ''}
                ${segment.audio_url ? `<audio controls preload="none" src="${esc(segment.audio_url)}"></audio>` : ''}
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderDetail(trace) {
      const llmMessages = JSON.stringify(trace.llm?.messages || [], null, 2);
      const llmDeltas = JSON.stringify(trace.llm?.deltas || [], null, 2);
      const timeline = (trace.timeline || []).map((event) => `
        <div class="event">
          <div><strong>${esc(event.name)}</strong> <span class="muted">${esc(event.at)}</span></div>
          ${event.detail ? `<div class="muted">${esc(event.detail)}</div>` : ''}
        </div>
      `).join('');
      detailEl.innerHTML = `
        <div class="grid">
          <section class="section">
            <h3>Overview</h3>
            <div class="meta-grid">${renderMeta(trace)}</div>
            ${trace.error ? `<pre>${esc(trace.error)}</pre>` : ''}
          </section>
          ${renderAudio('Input Audio', trace.input_audio_url, trace.input_audio)}
          ${renderSegments(trace)}
          <section class="section">
            <h3>ASR</h3>
            <div class="meta-grid">
              <div class="meta-item"><strong>duration</strong><span>${esc(trace.asr?.duration_ms || 0)} ms</span></div>
              <div class="meta-item"><strong>audio bytes</strong><span>${esc(trace.asr?.audio_bytes || 0)}</span></div>
              <div class="meta-item"><strong>format</strong><span>${esc(trace.asr?.format?.codec || trace.input_audio_format?.codec || '')}</span></div>
            </div>
            <pre>${esc(trace.asr?.text || '')}</pre>
          </section>
          <section class="section">
            <h3>LLM</h3>
            <div class="meta-grid">
              <div class="meta-item"><strong>duration</strong><span>${esc(trace.llm?.duration_ms || 0)} ms</span></div>
              <div class="meta-item"><strong>first delta</strong><span>${esc(trace.llm?.first_delta_ms || 0)} ms</span></div>
              <div class="meta-item"><strong>deltas</strong><span>${esc(trace.llm?.delta_count || 0)}</span></div>
              <div class="meta-item"><strong>delta chars</strong><span>${esc(trace.llm?.delta_chars || 0)}</span></div>
            </div>
            <h3>LLM Input</h3>
            <pre>${esc(llmMessages)}</pre>
            <h3>LLM Deltas</h3>
            <pre>${esc(llmDeltas)}</pre>
            <h3>LLM Response</h3>
            <pre>${esc(trace.llm?.response_text || '')}</pre>
          </section>
          <section class="section">
            <h3>TTS</h3>
            <div class="meta-grid">
              <div class="meta-item"><strong>duration</strong><span>${esc(trace.tts?.duration_ms || 0)} ms</span></div>
              <div class="meta-item"><strong>first chunk</strong><span>${esc(trace.tts?.first_chunk_ms || 0)} ms</span></div>
              <div class="meta-item"><strong>chunk count</strong><span>${esc(trace.tts?.chunk_count || 0)}</span></div>
              <div class="meta-item"><strong>audio bytes</strong><span>${esc(trace.tts?.audio_bytes || 0)}</span></div>
            </div>
            <pre>${esc(trace.tts?.text || '')}</pre>
          </section>
          ${renderAudio('TTS Audio', trace.tts_audio_url, trace.tts?.audio)}
          <section class="section">
            <h3>Timeline</h3>
            <div class="timeline">${timeline || '<div class="muted">No events.</div>'}</div>
          </section>
        </div>
      `;
    }

    async function loadTraces() {
      const response = await fetch('/debug/api/traces', { cache: 'no-store' });
      const data = await response.json();
      renderList(data.items || []);
    }

    async function loadDetail(id) {
      if (!id) return;
      const response = await fetch(`/debug/api/traces/${encodeURIComponent(id)}`, { cache: 'no-store' });
      if (!response.ok) {
        detailEl.innerHTML = '<div class="empty">Trace not found.</div>';
        return;
      }
      const data = await response.json();
      renderDetail(data);
    }

    refreshBtn.addEventListener('click', () => {
      loadTraces().catch((error) => {
        detailEl.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
      });
    });

    loadTraces().catch((error) => {
      detailEl.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
    });
    setInterval(() => {
      loadTraces().catch(() => {});
      if (selectedId) {
        loadDetail(selectedId).catch(() => {});
      }
    }, 1500);
  </script>
</body>
</html>
