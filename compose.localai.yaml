services:
  agensense:
    environment:
      AGENSENSE_DEFAULT_PROVIDER_NAME: "LocalAI Default"
      AGENSENSE_DEFAULT_PROVIDER_BASE_URL: "http://localai:8080/v1"
      AGENSENSE_DEFAULT_PROVIDER_API_KEY: "${LOCALAI_API_KEY:-}"
      AGENSENSE_DEFAULT_ASR_MODEL: "${AGENSENSE_DEFAULT_ASR_MODEL:-whisper-1}"
      AGENSENSE_DEFAULT_LLM_MODEL: "${AGENSENSE_DEFAULT_LLM_MODEL:-hauhaucs-qwen3.6-35b-a3b-aggressive-q4-k-m}"
      AGENSENSE_DEFAULT_TTS_MODEL: "${AGENSENSE_DEFAULT_TTS_MODEL:-faster-qwen3-tts}"
      AGENSENSE_OPENAI_TTS_VOICE: "${AGENSENSE_OPENAI_TTS_VOICE:-Serena}"
      AGENSENSE_OPENAI_TTS_RESPONSE_FORMAT: "${AGENSENSE_OPENAI_TTS_RESPONSE_FORMAT:-pcm}"
    depends_on:
      localai:
        condition: service_healthy

  localai:
    image: localai/localai:latest-cpu
    ports:
      - "8081:8080"
    environment:
      LOCALAI_API_KEY: "${LOCALAI_API_KEY:-}"
    volumes:
      - localai-models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  localai-models:
